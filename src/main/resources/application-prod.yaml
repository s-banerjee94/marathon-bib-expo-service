# ============================================================================
# PRODUCTION profile
# Activate with:  SPRING_PROFILES_ACTIVE=prod   (or --spring.profiles.active=prod)
#
# Only contains values that DIFFER from application.yaml; everything else is
# inherited from the base file. Values use ${ENV:productionDefault} so they are
# predefined here but can still be overridden per-deployment via env vars.
#
# Setup assumed:
#   Frontend (AWS Amplify):  https://example.com
#   Backend  (EC2 + nginx):  https://api.example.com   (nginx terminates TLS)
#   --> different ORIGIN, same SITE (example.com), both HTTPS
#
# >>> Replace every "example.com" below with your real domain. <<<
# Secrets (JWT_SECRET, DB_PASSWORD, AWS keys, QR secret) MUST come from env vars
# and are intentionally left without insecure defaults so the app fails fast if
# they are not provided.
# ============================================================================

# --- CORS -------------------------------------------------------------------
# allowed-origins is the EXACT frontend origin (never "*" together with
# credentials). Add more comma-separated origins if you have www / preview URLs.
# allowed-headers must include X-CSRF-Token, or the refresh preflight will fail.
cors:
  allowed-origins:   ${CORS_ALLOWED_ORIGINS:https://example.com}
  allowed-methods:   ${CORS_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS}
  allowed-headers:   ${CORS_ALLOWED_HEADERS:Authorization,Content-Type,X-CSRF-Token}
  exposed-headers:   ${CORS_EXPOSED_HEADERS:Authorization,Content-Type}
  allow-credentials: ${CORS_ALLOW_CREDENTIALS:true}
  max-age:           ${CORS_MAX_AGE:3600}

# --- JWT / cookies / CSRF ---------------------------------------------------
# cookie-secure=true  -> cookies only over HTTPS (nginx provides it).
# cookie-domain=.example.com -> shared parent so the Amplify frontend's JS can
#   read the csrfToken cookie issued by api.example.com (the double-submit point).
# RS256 keys have NO default here on purpose: prod must supply both file: locations
# via env (e.g. file:/opt/bibexpo/keys/jwt-private.pem). The private key is a secret;
# the public key may be shared with the Python agent for verify-only use.
jwt:
  private-key-location: ${JWT_PRIVATE_KEY_LOCATION}
  public-key-location:  ${JWT_PUBLIC_KEY_LOCATION}
  cookie-secure: ${JWT_COOKIE_SECURE:true}
  cookie-domain: ${JWT_COOKIE_DOMAIN:.example.com}

# --- Public participant-verification links ----------------------------------
# Used to build the /s/** QR/verification URLs. Must be a real public HTTPS host.
app:
  participant-access:
    base-url:  ${PARTICIPANT_ACCESS_BASE_URL:https://api.example.com}
    qr-secret: ${PARTICIPANT_ACCESS_QR_SECRET}
  # Invite links open the account-creation form on the frontend, so this is the frontend origin.
  invite:
    base-url:    ${INVITE_BASE_URL:https://example.com}
    accept-path: ${INVITE_ACCEPT_PATH:/accept-invite}
    ttl-minutes: ${INVITE_TTL_MINUTES:5}
  # Reset links open the set-new-password form on the frontend, so this is the frontend origin.
  password-reset:
    base-url:    ${PASSWORD_RESET_BASE_URL:https://example.com}
    reset-path:  ${PASSWORD_RESET_PATH:/reset-password}
    ttl-minutes: ${PASSWORD_RESET_TTL_MINUTES:10}

# --- Datasource -------------------------------------------------------------
# Host/credentials come from env in production. DB_PASSWORD has no default so a
# missing value fails fast instead of silently using the dev password.
spring:
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT:3306}/${DB_NAME}?useSSL=true&serverTimezone=UTC&allowPublicKeyRetrieval=false&connectionTimeZone=UTC&forceConnectionTimeZoneToSession=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:validate}   # prod should validate, not auto-update the schema
    show-sql: false

# --- AWS / DynamoDB ---------------------------------------------------------
# On EC2 use the instance IAM role: leave access keys empty and the endpoint
# empty so the SDK targets real AWS (region is required).
aws:
  region:   ${AWS_REGION:ap-south-1}
  dynamodb:
    endpoint: ${AWS_DYNAMODB_ENDPOINT:}
  # S3 for profile pictures / org & event logos. Bucket must already exist in
  # ap-south-1 and the EC2 instance role must allow s3:{Get,Put,Delete,Head}Object
  # on it. Configure bucket CORS to allow PUT/GET from the frontend origin so the
  # browser can use the presigned URLs directly. Empty endpoint => real AWS S3.
  s3:
    bucket:   ${AWS_S3_BUCKET}
    endpoint: ${AWS_S3_ENDPOINT:}

# --- Logging ----------------------------------------------------------------
# Quieter, non-DEBUG logging for production.
logging:
  level:
    com.timekeeper.bibexpo.security: INFO
    com.timekeeper.bibexpo.service.impl.JwtServiceImpl: INFO
