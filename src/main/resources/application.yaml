spring:
  application:
    name: marathon-bib-expo

  lifecycle:
    timeout-per-shutdown-phase: 180s

  batch:
    job:
      enabled: false

  datasource:
    url: jdbc:mysql://${DB_HOST:192.168.0.111}:${DB_PORT:3306}/${DB_NAME:marathon_bib_expo_test1}?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&connectionTimeZone=UTC&forceConnectionTimeZoneToSession=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    show-sql: ${SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        use_sql_comments: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
      file-size-threshold: 2KB

  jackson:
    datatype:
      datetime:
        write-dates-as-timestamps: false

  cache:
    type: ${CACHE_TYPE:caffeine}
    caffeine:
      spec: maximumSize=10000,expireAfterWrite=60s

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: marathon-bib-expo-service

server:
  address: 0.0.0.0
  port: ${SERVER_PORT:8080}
  shutdown: graceful
#  ssl:
#    enabled: true
#    key-store: classpath:keystore.p12
#    key-store-password: changeit
#    key-store-type: PKCS12
#    key-alias: bibexpo


# CORS Configuration
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:*}                          # local: matches any origin pattern (localhost + LAN IP over WiFi); works with allow-credentials via setAllowedOriginPatterns
  allowed-methods: ${CORS_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS}
  allowed-headers: ${CORS_ALLOWED_HEADERS:*}
  exposed-headers: ${CORS_EXPOSED_HEADERS:Authorization,Content-Type}
  allow-credentials: ${CORS_ALLOW_CREDENTIALS:true}
  max-age: ${CORS_MAX_AGE:3600}

# Root user configuration
root:
  username: ${ROOT_USERNAME:root}
  password: ${ROOT_PASSWORD:root}

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:default-secret-key-for-development-only-please-change-in-production-this-should-be-at-least-256-bits}
  issuer: marathon-bib-expo-service
  access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:900000}      # 15 minutes
  refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:604800000} # 7 days
  cookie-domain: ${JWT_COOKIE_DOMAIN:}                                # e.g. .yourdomain.com (empty for localhost)
  refresh-cookie-name: ${JWT_REFRESH_COOKIE_NAME:refreshToken}
  csrf-cookie-name: ${JWT_CSRF_COOKIE_NAME:csrfToken}
  cookie-secure: ${JWT_COOKIE_SECURE:false}                           # local default false (plain HTTP/LAN IP); MUST set JWT_COOKIE_SECURE=true in production (HTTPS)

logging:
  level:
    org.springframework.web.servlet.handler.HandlerMappingIntrospector: ERROR
    com.timekeeper.bibexpo.security: DEBUG
    com.timekeeper.bibexpo.service.impl.JwtServiceImpl: DEBUG

# Application Statistics and Participant Access Configuration
app:
  statistics:
    stale-threshold-minutes: ${STATS_STALE_THRESHOLD_MINUTES:15}
  participant-access:
    base-url: ${PARTICIPANT_ACCESS_BASE_URL:http://localhost:8080}
    qr-secret: ${PARTICIPANT_ACCESS_QR_SECRET:default-qr-secret-change-in-production}
  invite:
    base-url: ${INVITE_BASE_URL:http://192.168.0.107:4200}
    accept-path: ${INVITE_ACCEPT_PATH:/accept-invite}
    ttl-minutes: ${INVITE_TTL_MINUTES:5}
  # AES key that encrypts the root-managed provider secrets (API keys, passwords) at rest.
  system-messaging:
    secret-key: ${SYSTEM_MESSAGING_SECRET_KEY:dev-only-system-messaging-key-change-in-production}

# Batch import tuning
batch:
  import:
    max-duration-minutes: ${BATCH_IMPORT_MAX_DURATION_MINUTES:120}
    sweeper-interval-ms: ${BATCH_IMPORT_SWEEPER_INTERVAL_MS:900000}
    sweeper-initial-delay-ms: ${BATCH_IMPORT_SWEEPER_INITIAL_DELAY_MS:300000}

# Messaging — set true in dev/test to stub ALL outbound provider calls (logs the request, never sends)
messaging:
  stub-enabled: ${MESSAGING_STUB_ENABLED:true}

# SMS campaign scheduler — the provider connection (endpoint, auth, body) is configured in the DB
# via /api/system/campaign-providers (root) and /api/organizations/{id}/campaign-providers (org override)
sms:
  scheduler:
    send-delay-ms: ${SMS_SCHEDULER_SEND_DELAY_MS:10}
    max-retry-count: ${SMS_SCHEDULER_MAX_RETRY_COUNT:2}
    stuck-threshold-minutes: ${SMS_SCHEDULER_STUCK_THRESHOLD_MINUTES:20}

# WhatsApp campaign scheduler — the provider connection is configured in the DB (see campaign-providers)
whatsapp:
  scheduler:
    send-delay-ms: ${WHATSAPP_SCHEDULER_SEND_DELAY_MS:10}
    max-retry-count: ${WHATSAPP_SCHEDULER_MAX_RETRY_COUNT:2}
    stuck-threshold-minutes: ${WHATSAPP_SCHEDULER_STUCK_THRESHOLD_MINUTES:20}

# AWS Configuration
aws:
  region: ${AWS_REGION:us-east-1}
  access-key-id: ${AWS_ACCESS_KEY_ID:test}
  secret-access-key: ${AWS_SECRET_ACCESS_KEY:test}
  dynamodb:
    endpoint: ${AWS_DYNAMODB_ENDPOINT:http://192.168.0.111:4566}
    table-name: ${AWS_DYNAMODB_TABLE_NAME:marathon-participants}
  s3:
    bucket: ${AWS_S3_BUCKET:marathon-bib-expo-media}
    endpoint: ${AWS_S3_ENDPOINT:http://192.168.0.111:4566}                 # LocalStack locally; leave empty in prod to target real AWS S3
    upload-url-expiry-seconds: ${AWS_S3_UPLOAD_URL_EXPIRY_SECONDS:600}     # presigned PUT validity (10 min)
    download-url-expiry-seconds: ${AWS_S3_DOWNLOAD_URL_EXPIRY_SECONDS:3600} # presigned GET validity (1 hour)

# Event-lifecycle billing — Spring only fires/reads; all computation + PDF live in the billing Lambda
billing:
  scheduling:
    enabled: ${BILLING_SCHEDULING_ENABLED:false}                          # off locally (LocalStack stores but never fires schedules); set true on real AWS
  scheduler:
    endpoint: ${AWS_SCHEDULER_ENDPOINT:http://192.168.0.111:4566}         # LocalStack locally; leave empty in prod to target real AWS EventBridge Scheduler
    role-arn: ${BILLING_SCHEDULER_ROLE_ARN:arn:aws:iam::000000000000:role/test-scheduler-role}  # role EventBridge assumes to invoke the Lambda
    delay-hours: ${BILLING_DELAY_HOURS:5}                                 # auto-bill fires this long after an event turns terminal
  lambda:
    arn: ${BILLING_LAMBDA_ARN:arn:aws:lambda:us-east-1:000000000000:function:marathon-billing}  # billing Lambda (EventBridge target + manual-invoke target)
    endpoint: ${AWS_LAMBDA_ENDPOINT:http://192.168.0.111:4566}            # LocalStack locally; leave empty in prod to target real AWS Lambda
  stats-lambda:
    arn: ${BILLING_STATS_LAMBDA_ARN:arn:aws:lambda:us-east-1:000000000000:function:marathon-billing-stats}  # dedicated bill-stats Lambda, invoked async on finalize/payment/manual refresh
    endpoint: ${AWS_LAMBDA_ENDPOINT:http://192.168.0.111:4566}            # shares the bill Lambda's client/endpoint; only the ARN differs
