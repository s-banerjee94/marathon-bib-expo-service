services:
  mysql:
    image: mysql:8.0
    container_name: marathon-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - marathon-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    container_name: marathon-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - marathon-network
    depends_on:
      - mysql

  grafana:
    image: grafana/grafana:latest
    container_name: marathon-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    networks:
      - marathon-network
    depends_on:
      - prometheus

  localstack:
    # PERSISTENCE=1 below is a LocalStack Pro-only feature; this Community image ignores it,
    # so DynamoDB/S3 state is wiped on every container (re)start. For free persistence across
    # restarts, switch to localstack-persist: uncomment the "persist" image + volume lines
    # below and comment out their "ephemeral" counterparts. (init-aws.sh stays as-is; on later
    # starts its create-table/create-bucket calls just log harmless "already exists" errors.)
    image: localstack/localstack:latest          # ephemeral (Community)
    # image: gresau/localstack-persist:4         # persist: free state persistence (match LocalStack major version)
    container_name: marathon-localstack
    restart: unless-stopped
    ports:
      - "4566:4566"
    environment:
      - SERVICES=dynamodb,s3
      - DEBUG=${DEBUG:-0}
      - PERSISTENCE=1
    volumes:
      - localstack-data:/var/lib/localstack      # ephemeral (Community)
      # - localstack-data:/persisted-data        # persist: localstack-persist writes restorable state here
      - ./scripts/localstack-init.sh:/etc/localstack/init/ready.d/init-aws.sh
    networks:
      - marathon-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql-data:
  prometheus-data:
  grafana-data:
  localstack-data:

networks:
  marathon-network:
    driver: bridge
